name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./quicksave-backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ajo_test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4  # 👉 Upgraded to v4 to stop deprecation warnings
        with:
          node-version: '20.x'
          # 👉 Removed `cache: 'npm'` so GitHub stops looking for root lockfiles!

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔎 Code Quality (Typecheck ONLY)
        # 👉 Removed `npm run lint` so it doesn't crash looking for .eslintrc
        run: npx tsc --noEmit

      - name: 🔐 Setup Test Environment
        run: |
          echo "DATABASE_URL=postgresql://postgres:password@localhost:5432/ajo_test_db" >> .env.test
          echo "DIRECT_URL=postgresql://postgres:password@localhost:5432/ajo_test_db" >> .env.test
          echo "REDIS_URL=redis://localhost:6379" >> .env.test
          echo "JWT_SECRET=super_secret_test_key_for_github" >> .env.test
          echo "REFRESH_TOKEN_SECRET=super_secret_refresh_key" >> .env.test

      - name: 🗄️ Push DB Schema
        run: npm run test:db:setup

      - name: 🧪 Run Jest Tests & Coverage
        run: npm run test:ci