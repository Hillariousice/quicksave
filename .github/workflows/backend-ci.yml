name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    name: Backend Tests & Linting
    runs-on: ubuntu-latest
    
    # ⭐️ Monorepo path targeting
    defaults:
      run:
        working-directory: ./quicksave-backend

    # Spin up test databases
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ajo_test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4 # 👉 Upgraded to v4
        with:
          node-version: '22.x' # 👉 Matches your local Node version
          cache: 'npm'
          cache-dependency-path: './quicksave-backend/package-lock.json' # We don't use 'cache: npm' here easily because of the monorepo structure

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔎 Code Quality (Lint & Typecheck)
        run: |
          npm run lint
          npx tsc --noEmit

      - name: 🔐 Setup Test Environment
        run: |
          echo "DATABASE_URL=postgresql://postgres:password@localhost:5432/ajo_test_db" >> .env.test
          echo "DIRECT_URL=postgresql://postgres:password@localhost:5432/ajo_test_db" >> .env.test
          echo "REDIS_URL=redis://localhost:6379" >> .env.test
          echo "JWT_SECRET=super_secret_test_key_for_github" >> .env.test
          echo "REFRESH_TOKEN_SECRET=super_secret_refresh_key" >> .env.test

      - name: 🗄️ Push DB Schema
        run: npm run test:db:setup

      - name: 🧪 Run Jest Tests & Coverage
        run: npm run test:coverage