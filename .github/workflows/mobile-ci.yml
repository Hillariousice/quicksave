name: Mobile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    name: Mobile Tests & Linting
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./quicksave-mobile

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4  # 👉 Upgraded to v4
        with:
          node-version: '20.x'
          # 👉 Removed `cache: 'npm'` here too!

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔎 Code Quality (Lint & Typecheck)
        run: npm run validate

      - name: 🧪 Run Jest UI & Integration Tests
        run: npm run test