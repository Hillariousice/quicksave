name: Quicksave App CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    
    # We spin up a real Postgres DB inside the CI for Prisma/Integration tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ajo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'


      - name: Install Dependencies
        run: npm ci

      - name: Check Code Style (Lint)
        run: npm run lint

      - name: Validate Prisma Schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/ajo_test

      - name: Check TypeScript Compilation
        run: npx tsc --noEmit

      - name: Run Backend Tests & Coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/ajo_test
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

  mobile-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Mobile Deps
        working-directory: ./quicksave-mobile # Adjust if your folder name is different
        run: npm ci

      - name: Lint Mobile Code
        working-directory: ./quicksave-mobile
        run: npm run lint

      - name: Run Mobile Unit Tests
        working-directory: ./quicksave-mobile
        run: npm test